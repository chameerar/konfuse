name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Build standalone binaries ──────────────────────────────────────────────
  build-binaries:
    name: Build binary (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: macos-amd64
            goos: darwin
            goarch: amd64
          - target: macos-arm64
            goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" \
            -o dist/konfuse-${{ matrix.target }} .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: konfuse-${{ matrix.target }}
          path: dist/konfuse-${{ matrix.target }}

  # ── Create GitHub Release with all binaries ────────────────────────────────
  release:
    name: GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum konfuse-* > checksums.txt
          cat checksums.txt

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            dist/konfuse-linux-amd64
            dist/konfuse-linux-arm64
            dist/konfuse-macos-amd64
            dist/konfuse-macos-arm64
            dist/checksums.txt
