name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Build standalone binaries ──────────────────────────────────────────────
  build-binaries:
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-latest
            target: linux-arm64
          - os: macos-latest
            target: macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller PyYAML

      - name: Build binary (Linux arm64)
        if: matrix.target == 'linux-arm64'
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          install: |
            apt-get update -q
            apt-get install -y python3 python3-pip
            pip3 install pyinstaller PyYAML
          run: |
            pyinstaller --onefile --name konfuse konfuse.py
            mv dist/konfuse dist/konfuse-linux-arm64

      - name: Build binary (non-arm64)
        if: matrix.target != 'linux-arm64'
        run: |
          pyinstaller --onefile --name konfuse konfuse.py
          mv dist/konfuse dist/konfuse-${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: konfuse-${{ matrix.target }}
          path: dist/konfuse-${{ matrix.target }}

  # ── Create GitHub Release with all binaries ────────────────────────────────
  release:
    name: GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum konfuse-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/konfuse-linux-amd64
            dist/konfuse-linux-arm64
            dist/konfuse-macos-arm64
            dist/checksums.txt
          generate_release_notes: true

  # ── Publish to PyPI ────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
